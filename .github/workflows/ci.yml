name: CI
run-name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the real-engine GPU integration job"
        type: boolean
        default: false

jobs:
  checks:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.head_commit.author.email != 'semantic-release'
    uses: muxu-io/shared-workflows/.github/workflows/python-checks.yml@master
    secrets: inherit

  integration:
    needs: checks
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.head_commit.author.email != 'semantic-release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free up disk space
        uses: muxu-io/shared-workflows/.github/actions/free-disk-space@master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry and dev dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.in-project true
          poetry install --with dev

      - name: Build container image
        run: docker build -t voice-svc:integration .

      - name: Run mock-mode integration tests
        run: poetry run pytest -m integration tests/integration/test_container_e2e.py

  gpu-integration:
    needs: integration
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.run_gpu == true
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry and dev dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.in-project true
          poetry install --with dev

      - name: Build container image
        run: docker build -t voice-svc:integration .

      - name: Run real-engine GPU integration tests
        run: poetry run pytest -m gpu tests/integration/test_container_gpu_e2e.py
